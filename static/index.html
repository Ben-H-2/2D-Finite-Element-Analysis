<!DOCTYPE html>
<html>
<head>
  <title>FEA Editor</title>
  <style>
    body { margin: 0; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; }
    #toolbar { padding: 8px; background: #222; color: white; }
    #toolbar button.active { background: #4a9; }
    #refine-input.refine-warning {
      color: red;
      font-weight: bold;
      outline: 1px solid red;
    }
    #add-node-x::-webkit-outer-spin-button,
    #add-node-x::-webkit-inner-spin-button,
    #add-node-y::-webkit-outer-spin-button,
    #add-node-y::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    #add-node-x,
    #add-node-y {
      -moz-appearance: textfield;
    }
    canvas { background: #fafafa; display: block; flex: 1; }
    .slider-control {
      width: 100%;
      box-sizing: border-box;
      padding: 8px;
      background: #222;
      color: white;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    .slider-label {
      display: flex;
      gap: 8px;
      align-items: center;
      flex: 0 0 auto;
      min-width: 220px;
    }
    .slider-control input[type="range"] {
      flex: 1 1 100%;
      min-width: 220px;
      width: 100%;
      margin: 0;
      box-sizing: border-box;
    }
    .range-bounds {
      display: flex;
      gap: 8px;
      align-items: center;
      flex: 0 0 auto;
      }
    .range-bounds input {
      width: 64px;
      box-sizing: border-box;
    }
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .modal-box {
        background: white;
        padding: 24px;
        border-radius: 8px;
        max-width: 360px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    .modal-checkbox {
        display: block;
        margin: 16px 0;
        font-size: 0.9em;
    }
    .modal-buttons {
        display: flex;
        justify-content: flex-end;
        gap: 10px;
    }
    .modal-buttons button {
        padding: 6px 16px;
    }
    #warning-proceed-btn {
        background: #d9534f;
        color: white;
        border: none;
        border-radius: 4px;
    }
    #warning-cancel-btn {
        background: #eee;
        border: 1px solid #ccc;
        border-radius: 4px;
    }
    .spinner {
        width: 14px;
        height: 14px;
        border: 2px solid #555;
        border-top: 2px solid white;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
        to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="toolbar">
    <button id="mode-node">Place Node</button>
    <button id="mode-triangle">Make Triangle</button>
    <button id="mode-rectangle">Make Rectangle</button>
    <label>Refine: <input id="refine-input" type="number" value="1" min="0" max="8"></label>
    <button id="calculate-btn">Calculate</button>
    <button id="toggle-stress-btn">Toggle Stress</button>
    <button id="toggle-scale-btn">Scale: Linear</button>
    <button id="toggle-outlines-btn">Toggle Outlines</button>
    <button id="toggle-deformed-btn">Toggle Deformation</button>
    <button id="clear-mesh-btn">Clear Mesh</button>
    <span style="margin-left:16px;">
      X: <input id="add-node-x" type="number" step="any" style="width:30px;">
      Y: <input id="add-node-y" type="number" step="any" style="width:30px;">
      <button id="add-node-btn">Add Node</button>
    </span>
  </div>
  <div id="mouse-coords" style="position:fixed; left:16px; bottom:16px; background:#222; color:white; padding:6px 10px; border-radius:6px; font-size:0.8em; font-family:sans-serif; z-index:998;">
    X: —, Y: —
  </div>
  <div id="stress-tooltip" style="display:none; position:fixed; background:#222; color:white; padding:6px 10px; border-radius:6px; font-size:0.8em; font-family:sans-serif; z-index:999; pointer-events:none;">
  </div>
  <div id="solve-status" style="display:none; position: fixed; bottom: 16px; right: 16px; background: #222; color: white; padding: 10px 14px; border-radius: 6px; font-size: 0.85em; align-items: center; gap: 8px; z-index: 999;">
    <div class="spinner"></div>
    <span id="solve-status-text">Solving...</span>
  </div>
  </div>
  <div id="node-panel" style="display:none; position:absolute; background:#333; color:white; padding:10px; border-radius:4px;">
    <strong>Edit Node</strong>
    <span id="node-panel-coords" style="float:right; color:#999; font-size:0.75em; margin-left:12px;"></span>
    <br>
    <label>Force X: <input id="node-fx" type="number" value="0"></label><br>
    <label>Force Y: <input id="node-fy" type="number" value="0"></label><br>
    <label>Fix X: <input id="node-fixx" type="checkbox"></label>
    <label>Fix Y: <input id="node-fixy" type="checkbox"></label><br>
    <button id="node-panel-apply">Apply</button>
    <button id="node-panel-cancel">Cancel</button>
    <button id="node-panel-delete" style="background:#a33; color:white; border:none; border-radius:3px;">Delete</button>
  </div>
  <div id="edge-panel" style="display:none; position:absolute; background:#333; color:white; padding:10px; border-radius:4px;">
    <strong>Edit Edge</strong><br>
    <label>Type:
        <select id="edge-type">
            <option value="fix">Fix</option>
            <option value="force">Force</option>
        </select>
    </label>

    <div id="edge-fix-fields">
        <label><input type="checkbox" id="edge-fixx"> Fix X</label>
        <label><input type="checkbox" id="edge-fixy"> Fix Y</label>
    </div>

    <div id="edge-force-fields" style="display:none;">
        <label>Force X: <input type="number" id="edge-fx" value="0"></label>
        <label>Force Y: <input type="number" id="edge-fy" value="0"></label>
    </div>

    <button id="edge-panel-apply">Apply</button>
    <button id="edge-panel-cancel">Cancel</button>
  </div>
  <div class="slider-control">
    <div class="slider-label">
      <label for="deform-scale-slider">Deformation scale:</label>
      <span id="deform-scale-value">1</span>
    </div>
    <input type="range" id="deform-scale-slider" min="0" max="1000" value="1" step="1">
    <div class="range-bounds">
        <input type="number" id="deform-scale-min" value="0">
        <input type="number" id="deform-scale-max" value="1000">
    </div>
  </div>
<canvas id="canvas"></canvas>
  <div id="stress-legend" style="display:none; position:fixed; right:20px; bottom:20px; background:#222; color:white; padding:16px 18px; border-radius:8px; font-size:0.9em; font-family:sans-serif; z-index:998; width:420px; box-shadow:0 2px 12px rgba(0,0,0,0.45);">
    <div style="margin-bottom:10px; font-weight:bold;">Von Mises Stress (Pa)</div>
    <canvas id="legend-bar-canvas" width="420" height="30" style="width:100%; height:30px; border-radius:4px; display:block;"></canvas>
    <div id="legend-ticks" style="position:relative; height:18px; margin-top:6px; font-size:0.85em;"></div>
  </div>
  <script src="app.js" defer></script>
  <div id="warning-modal-overlay" class="modal-overlay" style="display:none;">
    <div class="modal-box">
      <h3 id="warning-modal-title">High refinement level</h3>
      <p id="warning-modal-message" style="white-space:pre-line;">This mesh density has a high chance of crashing due to element count. Do you want to proceed?</p>
      <label class="modal-checkbox">
        <input type="checkbox" id="warning-dont-show-again">
        Don't show this again
      </label>
      <div class="modal-buttons">
        <button id="warning-cancel-btn">Cancel</button>
        <button id="warning-proceed-btn">Proceed</button>
    </div>
  </div>
  </div>
</body>
</html>
