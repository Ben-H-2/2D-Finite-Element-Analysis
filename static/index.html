<!DOCTYPE html>
<html>
<head>
  <title>FEA Editor</title>
  <style>
    body { margin: 0; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; }
    #toolbar { padding: 8px; background: #222; color: white; }
    #toolbar button.active { background: #4a9; }
    #refine-input.refine-warning {
      color: red;
      font-weight: bold;
      outline: 1px solid red;
    }
    canvas { background: #fafafa; display: block; flex: 1; }
    .slider-control {
      width: 100%;
      box-sizing: border-box;
      padding: 8px;
      background: #222;
      color: white;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    .slider-label {
      display: flex;
      gap: 8px;
      align-items: center;
      flex: 0 0 auto;
      min-width: 220px;
    }
    .slider-control input[type="range"] {
      flex: 1 1 100%;
      min-width: 220px;
      width: 100%;
      margin: 0;
      box-sizing: border-box;
    }
    .range-bounds {
      display: flex;
      gap: 8px;
      align-items: center;
      flex: 0 0 auto;
    }
    .range-bounds input {
      width: 64px;
      box-sizing: border-box;
    }
  </style>
</head>
<body>
  <div id="toolbar">
    <button id="mode-node">Place Node</button>
    <button id="mode-triangle">Make Triangle</button>
    <button id="mode-rectangle">Make Rectangle</button>
    <label>Refine: <input id="refine-input" type="number" value="1" min="0" max="8"></label>
    <button id="calculate-btn">Calculate</button>
    <button id="toggle-stress-btn">Toggle Stress</button>
    <button id="toggle-outlines-btn">Toggle Outlines</button>
    <button id="toggle-deformed-btn">Toggle Deformation</button>
    <button id="clear-mesh-btn">Clear Mesh</button>
  </div>
  <div id="node-panel" style="display:none; position:absolute; background:#333; color:white; padding:10px; border-radius:4px;">
    <strong>Edit Node</strong><br>
    <label>Force X: <input id="node-fx" type="number" value="0"></label><br>
    <label>Force Y: <input id="node-fy" type="number" value="0"></label><br>
    <label>Fix X: <input id="node-fixx" type="checkbox"></label>
    <label>Fix Y: <input id="node-fixy" type="checkbox"></label><br>
    <button id="node-panel-apply">Apply</button>
    <button id="node-panel-cancel">Cancel</button>
  </div>
  <div id="edge-panel" style="display:none; position:absolute; background:#333; color:white; padding:10px; border-radius:4px;">
    <strong>Edit Edge</strong><br>
    <label>Type:
        <select id="edge-type">
            <option value="fix">Fix</option>
            <option value="force">Force</option>
        </select>
    </label>

    <div id="edge-fix-fields">
        <label><input type="checkbox" id="edge-fixx"> Fix X</label>
        <label><input type="checkbox" id="edge-fixy"> Fix Y</label>
    </div>

    <div id="edge-force-fields" style="display:none;">
        <label>Force X: <input type="number" id="edge-fx" value="0"></label>
        <label>Force Y: <input type="number" id="edge-fy" value="0"></label>
    </div>

    <button id="edge-panel-apply">Apply</button>
    <button id="edge-panel-cancel">Cancel</button>
  </div>
  <div class="slider-control">
    <div class="slider-label">
      <label for="deform-scale-slider">Deformation scale:</label>
      <span id="deform-scale-value">1</span>
    </div>
    <input type="range" id="deform-scale-slider" min="0" max="1000" value="1" step="1">
    <div class="range-bounds">
        <input type="number" id="deform-scale-min" value="0">
        <input type="number" id="deform-scale-max" value="1000">
    </div>
  </div>
  <canvas id="canvas"></canvas>
  <script src="app.js"></script>
</body>
</html>
